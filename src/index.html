<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Will's Website</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <script type="text/javascript">
    (function (l) {
      // Check if we have an encoded path in the URL
      if (l.search[1] === '/') {
        // Decode the path segments
        var decoded = l.search.slice(1)
          .split('&')
          .map(function (s) { return s.replace(/~and~/g, '&'); })
          .join('?');

        // Replace the URL without reloading
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>
</head>
