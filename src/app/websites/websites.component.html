<div class="websites-container container">
  <div class="row justify-content-center mb-4">
    <h2 class="text-center">{{ websites.title }}</h2>
    <p class="text-center text-muted">{{ websites.description }}</p>
    <p class="text-center text-muted">Work In Progress</p>
  </div>

  <div class="projects-grid">
    @for (project of websites.projects; track project) {
      <div class="project-card">
        <div class="project-card-header">
          <h5>{{ project.name }}</h5>
          <span class="project-type">{{ project.type }}</span>
        </div>
        <p class="project-description" [innerHTML]="project.description"></p>
        <div class="tech-badges">
          @for (tech of project.stack; track tech) {
            <span class="badge">{{ tech }}</span>
          }
        </div>
        <a class="visit-btn" [href]="project.url" target="_blank" rel="noopener noreferrer">
          Visit Site ↗
        </a>
      </div>
    }
  </div>
</div>
