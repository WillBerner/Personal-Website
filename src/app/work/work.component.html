<div class="work-container container">
  <div class="text-center">
    <h2>Enterprise Work Experience</h2>
  </div>

  <div class="text-center">
    <img
      [src]="workText.photos.oldTeamHomer.path"
      [alt]="workText.photos.oldTeamHomer.title"
      [title]="workText.photos.oldTeamHomer.title"
      style="max-height: 300px;" />
    <p class="photo-caption">{{ workText.photos.oldTeamHomer.caption }}</p>
  </div>

  <div class="work-intro">
    <h6 class="text-center">{{ workText.descriptions.current }}</h6>
  </div>

  <div class="roles-row">
    <div class="role-card" *ngFor="let role of roles">
      <h6 class="text-center">{{ role.title }}</h6>
      <div class="text-center">
        <span class="role-dates">{{ role.dates }}</span>
      </div>
      <p class="text-center">{{ role.description }}</p>
    </div>
  </div>
</div>
