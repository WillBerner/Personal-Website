<div class="work-container container">
  <div class="row justify-content-center mb-4">
    <h2 class="text-center">Enterprise Work Experience</h2>
  </div>

  <div class="row justify-center mb-4">
    <div class="col">
      <img src={{workText.photos.oldTeamHomer.path}} class="rounded img-responsive center-block d-block mx-auto" alt={{workText.photos.oldTeamHomer.title}} title={{workText.photos.oldTeamHomer.title}} style="max-height: 300px; max-width: 800px;" />
      <p class="text-center">{{workText.photos.oldTeamHomer.caption}}</p>
    </div>
  </div>

  <div class="row justify-center mb-4">
    <div class="col">
      <h6 class="text-center">{{workText.descriptions.current}}</h6>
    </div>
  </div>

  <div class="d-flex flex-column flex-xxl-row justify-content-between">
    <div class="flex-grow-1 flex-shrink-1 flex-md-basis-0 my-3 mx-4" *ngFor="let role of roles">
      <h6 class="text-center">{{role.title}}</h6>
      <p class="text-center"><small>{{role.dates}}</small></p>
      <p class="text-center">{{role.description}}</p>
    </div>
  </div>

</div>
